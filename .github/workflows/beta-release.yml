name: Beta Release

on:
  push:
    branches: [beta-release]
    tags: ['v*-beta*', 'v*-alpha*']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10.13.1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Build platform packages
      run: |
        # Build in dependency order (matches build.sh PACKAGES array)
        pnpm --filter '@sharpee/core' run build
        pnpm --filter '@sharpee/if-domain' run build
        pnpm --filter '@sharpee/media' run build
        pnpm --filter '@sharpee/world-model' run build
        pnpm --filter '@sharpee/helpers' run build
        pnpm --filter '@sharpee/event-processor' run build
        pnpm --filter '@sharpee/lang-en-us' run build
        pnpm --filter '@sharpee/parser-en-us' run build
        pnpm --filter '@sharpee/if-services' run build
        pnpm --filter '@sharpee/text-blocks' run build
        pnpm --filter '@sharpee/text-service' run build
        pnpm --filter '@sharpee/stdlib' run build
        pnpm --filter '@sharpee/character' run build
        pnpm --filter '@sharpee/plugins' run build
        pnpm --filter '@sharpee/plugin-npc' run build
        pnpm --filter '@sharpee/plugin-scheduler' run build
        pnpm --filter '@sharpee/plugin-state-machine' run build
        pnpm --filter '@sharpee/engine' run build
        pnpm --filter '@sharpee/platform-browser' run build
        pnpm --filter '@sharpee/sharpee' run build
        pnpm --filter '@sharpee/transcript-tester' run build

    - name: Run tests
      run: |
        pnpm --filter '@sharpee/core' test
        pnpm --filter '@sharpee/world-model' test
        pnpm --filter '@sharpee/parser-en-us' test
        pnpm --filter '@sharpee/stdlib' test
        pnpm --filter '@sharpee/character' test
        pnpm --filter '@sharpee/engine' test

    - name: Create release artifacts
      run: |
        mkdir -p release-artifacts
        for pkg in core if-domain world-model engine stdlib parser-en-us lang-en-us character text-service sharpee; do
          if [ -d "packages/$pkg/dist" ]; then
            tar -czvf "release-artifacts/sharpee-$pkg.tar.gz" -C "packages/$pkg" dist package.json
          fi
        done
        ls -la release-artifacts/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sharpee-packages
        path: release-artifacts/
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: sharpee-packages
        path: release-artifacts/

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Sharpee ${{ steps.version.outputs.VERSION }}
        body: |
          ## Sharpee ${{ steps.version.outputs.VERSION }}

          This is a beta release of the Sharpee Interactive Fiction platform.

          ### Packages
          - `@sharpee/core` - Core interfaces and utilities
          - `@sharpee/if-domain` - IF domain contracts
          - `@sharpee/world-model` - Entity system, traits, behaviors
          - `@sharpee/engine` - Game engine and scheduler
          - `@sharpee/stdlib` - Standard library (actions)
          - `@sharpee/character` - NPC behavior chain (conversation, goals, influence, propagation)
          - `@sharpee/parser-en-us` - English parser
          - `@sharpee/lang-en-us` - English language pack
          - `@sharpee/text-service` - Text rendering pipeline
          - `@sharpee/sharpee` - Meta-package (imports all)

          ### Installation
          ```bash
          npm install @sharpee/sharpee@beta
          ```

          ### Documentation
          See [README](https://github.com/ChicagoDave/sharpee#readme) for getting started.
        files: release-artifacts/*
        prerelease: true
        generate_release_notes: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10.13.1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: pnpm install

    - name: Build platform packages
      run: |
        pnpm --filter '@sharpee/core' run build
        pnpm --filter '@sharpee/if-domain' run build
        pnpm --filter '@sharpee/media' run build
        pnpm --filter '@sharpee/world-model' run build
        pnpm --filter '@sharpee/helpers' run build
        pnpm --filter '@sharpee/event-processor' run build
        pnpm --filter '@sharpee/lang-en-us' run build
        pnpm --filter '@sharpee/parser-en-us' run build
        pnpm --filter '@sharpee/if-services' run build
        pnpm --filter '@sharpee/text-blocks' run build
        pnpm --filter '@sharpee/text-service' run build
        pnpm --filter '@sharpee/stdlib' run build
        pnpm --filter '@sharpee/character' run build
        pnpm --filter '@sharpee/plugins' run build
        pnpm --filter '@sharpee/plugin-npc' run build
        pnpm --filter '@sharpee/plugin-scheduler' run build
        pnpm --filter '@sharpee/plugin-state-machine' run build
        pnpm --filter '@sharpee/engine' run build
        pnpm --filter '@sharpee/platform-browser' run build
        pnpm --filter '@sharpee/sharpee' run build
        pnpm --filter '@sharpee/transcript-tester' run build

    - name: Determine npm tag
      id: npm-tag
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        if [[ "$VERSION" == *"beta"* ]]; then
          echo "TAG=beta" >> $GITHUB_OUTPUT
        elif [[ "$VERSION" == *"alpha"* ]]; then
          echo "TAG=alpha" >> $GITHUB_OUTPUT
        else
          echo "TAG=latest" >> $GITHUB_OUTPUT
        fi

    - name: Publish to npm
      run: |
        for pkg in core if-domain media world-model helpers event-processor lang-en-us parser-en-us if-services text-blocks text-service stdlib character plugins engine sharpee; do
          if [ -d "packages/$pkg" ] && [ -f "packages/$pkg/package.json" ]; then
            echo "Publishing @sharpee/$pkg..."
            cd "packages/$pkg"
            pnpm publish --tag ${{ steps.npm-tag.outputs.TAG }} --access public --no-git-checks
            cd ../..
          fi
        done
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/beta-release'

    steps:
    - name: Build Summary
      run: |
        echo "## Beta Release Build Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Branch: beta-release" >> $GITHUB_STEP_SUMMARY
        echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "To create a release, push a tag:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "git tag v0.9.0-beta.1" >> $GITHUB_STEP_SUMMARY
        echo "git push origin v0.9.0-beta.1" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
