name: Build Platforms

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10.13.1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --ignore-scripts

    - name: Build platform packages
      run: |
        # Build in dependency order (matches build.sh PACKAGES array)
        pnpm --filter '@sharpee/core' run build
        pnpm --filter '@sharpee/if-domain' run build
        pnpm --filter '@sharpee/media' run build
        pnpm --filter '@sharpee/world-model' run build
        pnpm --filter '@sharpee/helpers' run build
        pnpm --filter '@sharpee/event-processor' run build
        pnpm --filter '@sharpee/lang-en-us' run build
        pnpm --filter '@sharpee/parser-en-us' run build
        pnpm --filter '@sharpee/if-services' run build
        pnpm --filter '@sharpee/text-blocks' run build
        pnpm --filter '@sharpee/text-service' run build
        pnpm --filter '@sharpee/stdlib' run build
        pnpm --filter '@sharpee/character' run build
        pnpm --filter '@sharpee/ext-basic-combat' run build
        pnpm --filter '@sharpee/plugins' run build
        pnpm --filter '@sharpee/plugin-npc' run build
        pnpm --filter '@sharpee/plugin-scheduler' run build
        pnpm --filter '@sharpee/plugin-state-machine' run build
        pnpm --filter '@sharpee/ext-testing' run build
        pnpm --filter '@sharpee/engine' run build
        pnpm --filter '@sharpee/platform-browser' run build
        pnpm --filter '@sharpee/sharpee' run build
        pnpm --filter '@sharpee/transcript-tester' run build

    - name: Typecheck
      run: pnpm --filter '@sharpee/sharpee' exec tsc --noEmit

    - name: Run tests
      run: |
        pnpm --filter '@sharpee/core' test
        pnpm --filter '@sharpee/world-model' test
        pnpm --filter '@sharpee/event-processor' test
        pnpm --filter '@sharpee/parser-en-us' test
        pnpm --filter '@sharpee/lang-en-us' test
        pnpm --filter '@sharpee/if-services' test
        pnpm --filter '@sharpee/text-service' test
        pnpm --filter '@sharpee/stdlib' test
        pnpm --filter '@sharpee/character' test
        pnpm --filter '@sharpee/engine' test
        pnpm --filter '@sharpee/transcript-tester' test
