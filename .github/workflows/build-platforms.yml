name: Build Platforms

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-core:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10.13.1
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install --ignore-scripts

    - name: Check for 'as any' casts in source files
      run: |
        # Fail CI if any unjustified 'as any' casts exist in package source files.
        # Excludes: test files, transcript-tester (test tooling), comments, and
        # lines with "as any: justified" (documented exceptions in AuthorModel/trait-types).
        HITS=$(find packages/*/src \
          -path 'packages/transcript-tester/*' -prune -o \
          -name '*.ts' ! -name '*.test.ts' ! -name '*.spec.ts' -print \
          | xargs grep -Hn ' as any' \
          | grep -v '// .*as any' \
          | grep -v '\* .*as any' \
          | grep -v '`as any`' \
          | grep -v 'as any: justified' \
          || true)
        if [ -n "$HITS" ]; then
          echo "::error::Found 'as any' casts in source files (ISSUE-063 regression):"
          echo "$HITS"
          exit 1
        fi
        echo "No unjustified 'as any' casts found in source files."

    - name: Build packages in correct order
      run: |
        pnpm --filter '@sharpee/core' run build
        pnpm --filter '@sharpee/if-domain' run build
        pnpm --filter '@sharpee/world-model' run build
        pnpm --filter '@sharpee/if-services' run build
        pnpm --filter '@sharpee/text-services' run build
        pnpm --filter '@sharpee/lang-en-us' run build
        pnpm --filter '@sharpee/parser-en-us' run build
        pnpm --filter '@sharpee/stdlib' run build
        pnpm --filter '@sharpee/event-processor' run build
        pnpm --filter '@sharpee/engine' run build
        pnpm --filter '@sharpee/sharpee' run build
        pnpm --filter '@sharpee/platform-cli-en-us' run build
        pnpm --filter '@sharpee/platform-test' run build || true
      
    - name: Upload core artifacts
      uses: actions/upload-artifact@v4
      with:
        name: core-packages
        path: |
          packages/*/dist
          !packages/platforms/*/dist

  build-platform-cli-en:
    needs: build-core
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10.13.1
        
    - name: Download core artifacts
      uses: actions/download-artifact@v4
      with:
        name: core-packages
        path: packages
        
    - name: Install dependencies
      run: pnpm install --ignore-scripts
      
    - name: Build CLI English platform
      run: pnpm turbo run build --filter='@sharpee/platform-cli-en-us'
      
    - name: Test CLI English platform
      run: pnpm --filter '@sharpee/platform-cli-en-us' run test || true
      
    - name: Upload platform artifacts
      uses: actions/upload-artifact@v4
      with:
        name: platform-cli-en-us
        path: packages/platforms/cli-en-us/dist

  test-integration:
    needs: [build-core, build-platform-cli-en]
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10.13.1
        
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: packages
        
    - name: Install dependencies
      run: pnpm install --ignore-scripts
      
    - name: Run integration tests
      run: pnpm test:ci || true
      
  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test-integration
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10.13.1
        
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: packages
        
    - name: Install dependencies
      run: pnpm install --ignore-scripts
      
    - name: Version and publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        echo "Ready for release - add versioning and publish logic here"
        # pnpm changeset version
        # pnpm changeset publish