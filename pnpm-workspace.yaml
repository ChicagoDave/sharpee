packages:
  - packages/*
  - packages/extensions/testing
  - packages/extensions/basic-combat
  - packages/extensions/scoring
  - '!packages/map-editor'
  - '!packages/interpreter'
  - stories/dungeo
  - stories/channel-service-test
  - stories/friendly-zoo
  # Chord golden gate (ADR-210 Phase A): membership makes `./repokit build
  # cloak-of-darkness` emit dist/extras.js (the cloak.story hatch module).
  - stories/cloak-of-darkness
  # tutorials/familyzoo is a standalone book-aligned project that consumes the
  # published @sharpee/* npm packages — it is no longer a workspace member.
  - tools/shite
  - tools/zifmia
  - tools/repokit

# Public-hoist @sharpee/* and the lz-string vendored baseline entry so
# Node's ESM resolver can find every Story Runtime Baseline (ADR-178)
# package from arbitrary paths during dev — e.g., the bundle-cache
# directory the engine writes story.js into. The Docker runtime image
# already gets a flat node_modules via `pnpm deploy --legacy`; this
# config makes the dev workspace match that shape.
publicHoistPattern:
  - '@sharpee/*'
  - 'lz-string'

ignoredBuiltDependencies:
  - electron

onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - nx
