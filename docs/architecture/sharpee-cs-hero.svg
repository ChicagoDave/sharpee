<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <defs>
    <!-- Haze/glow filter -->
    <filter id="haze" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="deepHaze" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <!-- Node colors -->
    <linearGradient id="nodeHash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="nodeTree" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ee787" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#238636" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="nodeGraph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d2a8ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="nodePipe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffa657" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Atmospheric haze blobs -->
  <circle cx="200" cy="250" r="180" fill="#58a6ff" opacity="0.04" filter="url(#deepHaze)"/>
  <circle cx="500" cy="350" r="200" fill="#7ee787" opacity="0.04" filter="url(#deepHaze)"/>
  <circle cx="850" cy="250" r="170" fill="#d2a8ff" opacity="0.04" filter="url(#deepHaze)"/>
  <circle cx="600" cy="520" r="220" fill="#ffa657" opacity="0.03" filter="url(#deepHaze)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- SECTION 1: Hash Map (Entity Store)      -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#haze)" transform="translate(60, 100)">
    <!-- Label -->
    <text x="105" y="-15" fill="#58a6ff" font-size="11" text-anchor="middle" opacity="0.7" letter-spacing="2">HASH MAP</text>

    <!-- Key-value pairs -->
    <g opacity="0.85">
      <!-- Slot 0 -->
      <rect x="10" y="0" width="90" height="28" rx="4" fill="none" stroke="#58a6ff" stroke-opacity="0.4" stroke-width="1"/>
      <text x="55" y="18" fill="#58a6ff" font-size="10" text-anchor="middle" opacity="0.9">lantern</text>
      <line x1="100" y1="14" x2="130" y2="14" stroke="#58a6ff" stroke-opacity="0.3" stroke-width="1"/>
      <rect x="130" y="2" width="72" height="24" rx="12" fill="url(#nodeHash)" opacity="0.5"/>
      <text x="166" y="18" fill="#c9d1d9" font-size="9" text-anchor="middle">{...}</text>

      <!-- Slot 1 -->
      <rect x="10" y="36" width="90" height="28" rx="4" fill="none" stroke="#58a6ff" stroke-opacity="0.4" stroke-width="1"/>
      <text x="55" y="54" fill="#58a6ff" font-size="10" text-anchor="middle" opacity="0.9">troll</text>
      <line x1="100" y1="50" x2="130" y2="50" stroke="#58a6ff" stroke-opacity="0.3" stroke-width="1"/>
      <rect x="130" y="38" width="72" height="24" rx="12" fill="url(#nodeHash)" opacity="0.5"/>
      <text x="166" y="54" fill="#c9d1d9" font-size="9" text-anchor="middle">{...}</text>

      <!-- Slot 2 -->
      <rect x="10" y="72" width="90" height="28" rx="4" fill="none" stroke="#58a6ff" stroke-opacity="0.4" stroke-width="1"/>
      <text x="55" y="90" fill="#58a6ff" font-size="10" text-anchor="middle" opacity="0.9">sword</text>
      <line x1="100" y1="86" x2="130" y2="86" stroke="#58a6ff" stroke-opacity="0.3" stroke-width="1"/>
      <rect x="130" y="74" width="72" height="24" rx="12" fill="url(#nodeHash)" opacity="0.5"/>
      <text x="166" y="90" fill="#c9d1d9" font-size="9" text-anchor="middle">{...}</text>

      <!-- Slot 3 (faded) -->
      <rect x="10" y="108" width="90" height="28" rx="4" fill="none" stroke="#58a6ff" stroke-opacity="0.2" stroke-width="1"/>
      <text x="55" y="126" fill="#58a6ff" font-size="10" text-anchor="middle" opacity="0.4">room</text>
      <line x1="100" y1="122" x2="130" y2="122" stroke="#58a6ff" stroke-opacity="0.15" stroke-width="1"/>
      <rect x="130" y="110" width="72" height="24" rx="12" fill="url(#nodeHash)" opacity="0.25"/>

      <!-- Slot 4 (very faded) -->
      <rect x="10" y="144" width="90" height="28" rx="4" fill="none" stroke="#58a6ff" stroke-opacity="0.1" stroke-width="1"/>
    </g>

    <!-- O(1) annotation -->
    <text x="105" y="200" fill="#58a6ff" font-size="10" text-anchor="middle" opacity="0.5" font-style="italic">O(1) lookup</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- SECTION 2: Tree (SpatialIndex)          -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#haze)" transform="translate(370, 80)">
    <!-- Label -->
    <text x="120" y="-15" fill="#7ee787" font-size="11" text-anchor="middle" opacity="0.7" letter-spacing="2">CONTAINMENT TREE</text>

    <!-- Root: Living Room -->
    <circle cx="120" cy="20" r="16" fill="url(#nodeTree)" opacity="0.6"/>
    <text x="120" y="24" fill="#0d1117" font-size="8" text-anchor="middle" font-weight="bold">Room</text>

    <!-- Branches -->
    <line x1="108" y1="34" x2="50" y2="75" stroke="#7ee787" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="120" y1="36" x2="120" y2="75" stroke="#7ee787" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="132" y1="34" x2="195" y2="75" stroke="#7ee787" stroke-opacity="0.3" stroke-width="1"/>

    <!-- Child: table -->
    <circle cx="50" cy="90" r="12" fill="url(#nodeTree)" opacity="0.45"/>
    <text x="50" y="93" fill="#0d1117" font-size="7" text-anchor="middle">table</text>

    <!-- Child: rug -->
    <circle cx="120" cy="90" r="12" fill="url(#nodeTree)" opacity="0.45"/>
    <text x="120" y="93" fill="#0d1117" font-size="7" text-anchor="middle">rug</text>

    <!-- Child: player -->
    <circle cx="195" cy="90" r="14" fill="url(#nodeTree)" opacity="0.55"/>
    <text x="195" y="93" fill="#0d1117" font-size="7" text-anchor="middle">player</text>

    <!-- Grandchildren of table -->
    <line x1="42" y1="101" x2="25" y2="135" stroke="#7ee787" stroke-opacity="0.2" stroke-width="1"/>
    <line x1="58" y1="101" x2="75" y2="135" stroke="#7ee787" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="25" cy="148" r="10" fill="url(#nodeTree)" opacity="0.3"/>
    <text x="25" y="151" fill="#0d1117" font-size="6" text-anchor="middle">lamp</text>
    <circle cx="75" cy="148" r="10" fill="url(#nodeTree)" opacity="0.3"/>
    <text x="75" y="151" fill="#0d1117" font-size="6" text-anchor="middle">note</text>

    <!-- Grandchild of player -->
    <line x1="195" y1="104" x2="195" y2="135" stroke="#7ee787" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="195" cy="148" r="10" fill="url(#nodeTree)" opacity="0.3"/>
    <text x="195" y="151" fill="#0d1117" font-size="6" text-anchor="middle">sword</text>

    <!-- Bidirectional arrows annotation -->
    <g transform="translate(60, 185)" opacity="0.5">
      <text x="0" y="0" fill="#7ee787" font-size="8" opacity="0.8">parent</text>
      <line x1="38" y1="-4" x2="62" y2="-4" stroke="#7ee787" stroke-opacity="0.5" stroke-width="1" marker-end="url(#arrowG)"/>
      <line x1="62" y1="2" x2="38" y2="2" stroke="#7ee787" stroke-opacity="0.5" stroke-width="1" marker-end="url(#arrowG)"/>
      <text x="66" y="0" fill="#7ee787" font-size="8" opacity="0.8">children</text>
    </g>
    <text x="120" y="220" fill="#7ee787" font-size="10" text-anchor="middle" opacity="0.5" font-style="italic">O(1) both ways</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- SECTION 3: Graph (Room Connections)     -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#haze)" transform="translate(740, 80)">
    <!-- Label -->
    <text x="140" y="-15" fill="#d2a8ff" font-size="11" text-anchor="middle" opacity="0.7" letter-spacing="2">ROOM GRAPH</text>

    <!-- Rooms as nodes -->
    <!-- Kitchen -->
    <rect x="100" y="10" width="80" height="30" rx="6" fill="url(#nodeGraph)" opacity="0.5"/>
    <text x="140" y="29" fill="#0d1117" font-size="8" text-anchor="middle" font-weight="bold">Kitchen</text>

    <!-- Hallway -->
    <rect x="15" y="90" width="80" height="30" rx="6" fill="url(#nodeGraph)" opacity="0.4"/>
    <text x="55" y="109" fill="#0d1117" font-size="8" text-anchor="middle">Hallway</text>

    <!-- Pantry -->
    <rect x="185" y="90" width="80" height="30" rx="6" fill="url(#nodeGraph)" opacity="0.4"/>
    <text x="225" y="109" fill="#0d1117" font-size="8" text-anchor="middle">Pantry</text>

    <!-- Library -->
    <rect x="15" y="170" width="80" height="30" rx="6" fill="url(#nodeGraph)" opacity="0.3"/>
    <text x="55" y="189" fill="#0d1117" font-size="8" text-anchor="middle">Library</text>

    <!-- Cellar -->
    <rect x="185" y="170" width="80" height="30" rx="6" fill="url(#nodeGraph)" opacity="0.3"/>
    <text x="225" y="189" fill="#0d1117" font-size="8" text-anchor="middle">Cellar</text>

    <!-- Edges -->
    <!-- Kitchen ↔ Hallway -->
    <line x1="110" y1="40" x2="70" y2="90" stroke="#d2a8ff" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="78" y="62" fill="#d2a8ff" font-size="7" opacity="0.5" transform="rotate(-35, 78, 62)">north</text>

    <!-- Kitchen ↔ Pantry -->
    <line x1="170" y1="40" x2="210" y2="90" stroke="#d2a8ff" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="200" y="62" fill="#d2a8ff" font-size="7" opacity="0.5" transform="rotate(35, 200, 62)">east</text>

    <!-- Door icon on Kitchen→Pantry -->
    <rect x="186" y="60" width="14" height="10" rx="2" fill="none" stroke="#d2a8ff" stroke-opacity="0.5" stroke-width="0.8"/>
    <text x="193" y="68" fill="#d2a8ff" font-size="6" text-anchor="middle" opacity="0.6">via</text>

    <!-- Hallway ↔ Library -->
    <line x1="55" y1="120" x2="55" y2="170" stroke="#d2a8ff" stroke-opacity="0.25" stroke-width="1.5"/>

    <!-- Pantry → Cellar (one-way: dashed) -->
    <line x1="225" y1="120" x2="225" y2="170" stroke="#d2a8ff" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="240" y="148" fill="#d2a8ff" font-size="7" opacity="0.4">one-way</text>

    <!-- Hallway ↔ Pantry (faded cross-connection) -->
    <line x1="95" y1="105" x2="185" y2="105" stroke="#d2a8ff" stroke-opacity="0.15" stroke-width="1"/>

    <text x="140" y="225" fill="#d2a8ff" font-size="10" text-anchor="middle" opacity="0.5" font-style="italic">adjacency list (sparse)</text>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- SECTION 4: Parser Pipeline              -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#haze)" transform="translate(60, 420)">
    <!-- Label -->
    <text x="530" y="-10" fill="#ffa657" font-size="11" text-anchor="middle" opacity="0.7" letter-spacing="2">PARSER PIPELINE</text>

    <!-- Input string -->
    <rect x="0" y="15" width="155" height="34" rx="4" fill="none" stroke="#ffa657" stroke-opacity="0.4" stroke-width="1"/>
    <text x="78" y="27" fill="#ffa657" font-size="8" text-anchor="middle" opacity="0.5">player input</text>
    <text x="78" y="42" fill="#c9d1d9" font-size="11" text-anchor="middle" font-style="italic">"take brass lantern"</text>

    <!-- Arrow 1 -->
    <line x1="160" y1="32" x2="195" y2="32" stroke="#ffa657" stroke-opacity="0.3" stroke-width="1.5"/>
    <polygon points="193,28 200,32 193,36" fill="#ffa657" opacity="0.4"/>

    <!-- Tokenize -->
    <rect x="205" y="15" width="100" height="34" rx="6" fill="url(#nodePipe)" opacity="0.35"/>
    <text x="255" y="36" fill="#c9d1d9" font-size="10" text-anchor="middle">Tokenize</text>

    <!-- Arrow 2 -->
    <line x1="310" y1="32" x2="345" y2="32" stroke="#ffa657" stroke-opacity="0.3" stroke-width="1.5"/>
    <polygon points="343,28 350,32 343,36" fill="#ffa657" opacity="0.4"/>

    <!-- Grammar Match -->
    <rect x="355" y="15" width="100" height="34" rx="6" fill="url(#nodePipe)" opacity="0.4"/>
    <text x="405" y="36" fill="#c9d1d9" font-size="10" text-anchor="middle">Match</text>

    <!-- Arrow 3 -->
    <line x1="460" y1="32" x2="495" y2="32" stroke="#ffa657" stroke-opacity="0.3" stroke-width="1.5"/>
    <polygon points="493,28 500,32 493,36" fill="#ffa657" opacity="0.4"/>

    <!-- Resolve -->
    <rect x="505" y="15" width="100" height="34" rx="6" fill="url(#nodePipe)" opacity="0.45"/>
    <text x="555" y="36" fill="#c9d1d9" font-size="10" text-anchor="middle">Resolve</text>

    <!-- Arrow 4 -->
    <line x1="610" y1="32" x2="645" y2="32" stroke="#ffa657" stroke-opacity="0.3" stroke-width="1.5"/>
    <polygon points="643,28 650,32 643,36" fill="#ffa657" opacity="0.4"/>

    <!-- Validate -->
    <rect x="655" y="15" width="100" height="34" rx="6" fill="url(#nodePipe)" opacity="0.5"/>
    <text x="705" y="36" fill="#c9d1d9" font-size="10" text-anchor="middle">Validate</text>

    <!-- Arrow 5 -->
    <line x1="760" y1="32" x2="795" y2="32" stroke="#ffa657" stroke-opacity="0.3" stroke-width="1.5"/>
    <polygon points="793,28 800,32 793,36" fill="#ffa657" opacity="0.4"/>

    <!-- Execute -->
    <rect x="805" y="15" width="100" height="34" rx="6" fill="url(#nodePipe)" opacity="0.55"/>
    <text x="855" y="36" fill="#c9d1d9" font-size="10" text-anchor="middle">Execute</text>

    <!-- Arrow 6 -->
    <line x1="910" y1="32" x2="945" y2="32" stroke="#ffa657" stroke-opacity="0.3" stroke-width="1.5"/>
    <polygon points="943,28 950,32 943,36" fill="#ffa657" opacity="0.4"/>

    <!-- Output -->
    <rect x="955" y="15" width="105" height="34" rx="4" fill="none" stroke="#7ee787" stroke-opacity="0.4" stroke-width="1"/>
    <text x="1008" y="27" fill="#7ee787" font-size="8" text-anchor="middle" opacity="0.5">state mutation</text>
    <text x="1008" y="42" fill="#c9d1d9" font-size="9" text-anchor="middle">lantern</text>
    <text x="1008" y="42" fill="#7ee787" font-size="9" text-anchor="middle" dx="38" opacity="0.6">taken</text>

    <!-- Data type annotations below pipeline -->
    <text x="78" y="65" fill="#ffa657" font-size="7" text-anchor="middle" opacity="0.35">string</text>
    <text x="255" y="65" fill="#ffa657" font-size="7" text-anchor="middle" opacity="0.35">Token[]</text>
    <text x="405" y="65" fill="#ffa657" font-size="7" text-anchor="middle" opacity="0.35">Match[]</text>
    <text x="555" y="65" fill="#ffa657" font-size="7" text-anchor="middle" opacity="0.35">Entity ID</text>
    <text x="705" y="65" fill="#ffa657" font-size="7" text-anchor="middle" opacity="0.35">Command</text>
    <text x="855" y="65" fill="#ffa657" font-size="7" text-anchor="middle" opacity="0.35">Effects</text>

    <!-- Connection lines from upper structures down to pipeline -->
    <!-- Hash map feeds into Resolve -->
    <line x1="200" y1="310" x2="555" y2="15" stroke="#58a6ff" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="3,4"/>
    <!-- Tree feeds into Validate -->
    <line x1="490" y1="310" x2="705" y2="15" stroke="#7ee787" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="3,4"/>
    <!-- Graph feeds into Execute -->
    <line x1="880" y1="310" x2="855" y2="15" stroke="#d2a8ff" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="3,4"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- Title text -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#softGlow)">
    <text x="600" y="590" fill="#8b949e" font-size="13" text-anchor="middle" opacity="0.4" letter-spacing="3" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">DATA STRUCTURES OF AN INTERACTIVE FICTION ENGINE</text>
  </g>
</svg>