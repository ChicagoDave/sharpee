<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharpee — Design Patterns</title>
  <style>
    :root {
      --color-bg: #f8fafc;
      --color-text: #1e293b;
      --color-muted: #64748b;
      --color-accent: #059669;
      --color-accent-hover: #047857;
      --color-border: #e2e8f0;
      --color-surface: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
    }

    a { color: var(--color-accent); text-decoration: none; }
    a:hover { color: var(--color-accent-hover); }

    .page-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Header bar */
    .patterns-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .patterns-header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .patterns-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .count { color: var(--color-muted); font-size: 0.8rem; margin-left: 0.5rem; font-weight: normal; }

    /* Breadcrumb */
    .breadcrumb {
      display: none;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
    }
    .breadcrumb.visible { display: flex; }
    .breadcrumb a {
      color: var(--color-accent);
      text-decoration: none;
      cursor: pointer;
    }
    .breadcrumb a:hover { color: var(--color-accent-hover); }
    .breadcrumb .sep { color: var(--color-muted); }
    .breadcrumb .current { color: var(--color-text); font-weight: 500; }

    /* Search */
    .search-box {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      color: var(--color-text);
      padding: 0.375rem 0.75rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      width: 220px;
      min-width: 140px;
    }
    .search-box::placeholder { color: var(--color-muted); }
    .search-box:focus { outline: none; border-color: var(--color-accent); }

    /* Category cards */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }
    .category-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 0.75rem;
      padding: 1.5rem;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .category-card:hover {
      border-color: var(--color-accent);
      transform: translateY(-2px);
    }
    .cat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .cat-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .cat-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cat-count {
      font-size: 0.8rem;
      color: var(--color-muted);
      background: var(--color-bg);
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
    }
    .cat-preview {
      font-size: 0.85rem;
      color: var(--color-muted);
      line-height: 1.5;
    }
    .cat-preview-item { display: inline; }
    .cat-preview-item + .cat-preview-item::before {
      content: ' \00b7 ';
      color: var(--color-border);
    }
    .cat-arrow {
      color: var(--color-muted);
      font-size: 1.25rem;
      margin-top: 0.75rem;
      text-align: right;
    }

    /* Pattern cards */
    .patterns-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }
    .pattern-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .pattern-card:hover {
      border-color: var(--color-accent);
      box-shadow: 0 2px 8px rgba(5, 150, 105, 0.08);
    }
    .card-top {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }
    .card-id {
      font-size: 0.7rem;
      color: var(--color-muted);
      font-family: monospace;
      flex-shrink: 0;
    }
    .card-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-text);
    }
    .card-intent {
      font-size: 0.8rem;
      color: var(--color-muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Detail panel */
    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 380px;
      height: 100vh;
      background: var(--color-surface);
      border-left: 1px solid var(--color-border);
      padding: 1.5rem;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 200;
    }
    .detail-panel.open { transform: translateX(0); }
    .detail-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--color-muted);
      font-size: 1.25rem;
      cursor: pointer;
    }
    .detail-close:hover { color: var(--color-text); }
    .detail-id {
      font-size: 0.75rem;
      color: var(--color-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .detail-name {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--color-text);
      margin: 0.25rem 0 0.75rem;
    }
    .detail-category {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }
    .detail-section h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-muted);
      margin: 1rem 0 0.375rem;
    }
    .detail-section p {
      font-size: 0.875rem;
      line-height: 1.5;
      color: var(--color-text);
    }
    .detail-connections {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-top: 0.375rem;
    }
    .detail-conn {
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 0.25rem;
      color: var(--color-muted);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .detail-conn:hover {
      border-color: var(--color-accent);
      color: var(--color-text);
    }

    /* Overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 150;
    }
    .overlay.active { display: block; }

    /* Transitions */
    .fade-in {
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mobile */
    @media (max-width: 640px) {
      .categories-grid { grid-template-columns: 1fr; }
      .patterns-grid { grid-template-columns: 1fr; }
      .search-box { width: 100%; }
      .detail-panel { width: 100vw; }
    }
  </style>
</head>

  </div>

    },
    {

    {
      "id": "OBJ-011",

    {

    },
    {
      "id": "OBJ-013",
      "name": "Vehicle",
      "category": "Objects",
      "intent": "An object the player can board that transports them between locations. Vehicles are enterable containers that change location — the player rides inside rather than walking."
    },
    {
      "id": "OBJ-014",
      "name": "Currency/Money",
      "category": "Objects",
      "intent": "Items with numeric value used for exchange. Currency enables trading (DP-203) with a fungible medium rather than direct barter. Money creates resource management decisions — spend now or save for later."
    },
    {
      "id": "OBJ-015",
      "name": "Enchantable/Magical",
      "category": "Objects",
      "intent": "An object that can gain, lose, or change properties through spells, rituals, or other transformative actions. Unlike DP-008 (Transformation) which covers the puzzle mechanic, this pattern describes the *object type* — items designed to be targets of magical modification."
    },
    {
      "id": "NARR-001",
      "name": "Ticking Clock",
      "category": "Narrative",
      "intent": "Create urgency and tension through time pressure."
    },
    {
      "id": "NARR-002",
      "name": "In Medias Res",
      "category": "Narrative",
      "intent": "Begin the story in the middle of action, revealing context through play rather than exposition."
    },
    {
      "id": "NARR-003",
      "name": "Discovery",
      "category": "Narrative",
      "intent": "Reveal backstory, world history, and context through player exploration rather than upfront exposition."
    },
    {
      "id": "NARR-004",
      "name": "Multiple Endings",
      "category": "Narrative",
      "intent": "Provide narrative closure that reflects player choices, creating replayability and meaningful consequences."
    },
    {
      "id": "NARR-005",
      "name": "Point of No Return",
      "category": "Narrative",
      "intent": "Create dramatic weight and commitment through irreversible progression points."
    },
    {
      "id": "NARR-006",
      "name": "Multiple Solutions",
      "category": "Narrative",
      "intent": "Reward player creativity and support different playstyles by allowing various approaches to challenges."
    },
    {
      "id": "NARR-007",
      "name": "Flashback",
      "category": "Narrative",
      "intent": "Reveal past events through playable sequences, providing context and dramatic irony."
    },
    {
      "id": "NARR-008",
      "name": "Unreliable Frame",
      "category": "Narrative",
      "intent": "Create narrative complexity by making the presentation of events untrustworthy, enabling twists and thematic depth."
    },
    {
      "id": "NARR-009",
      "name": "Epistolary",
      "category": "Narrative",
      "intent": "Tell story through in-world documents, enabling discovery-based narrative and multiple perspectives."
    },
    {
      "id": "NARR-010",
      "name": "Red Herring",
      "category": "Narrative",
      "intent": "Misdirect player attention, creating suspense, surprise, and investigative depth."
    },
    {
      "id": "NARR-011",
      "name": "Foreshadowing",
      "category": "Narrative",
      "intent": "Create narrative satisfaction and replayability by planting hints that pay off later."
    },
    {
      "id": "NARR-012",
      "name": "Dramatic Irony",
      "category": "Narrative",
      "intent": "Create tension and emotional engagement through information asymmetry between player and character."
    },
    {
      "id": "NARR-013",
      "name": "Parallel Storylines",
      "category": "Narrative",
      "intent": "Create narrative complexity and dramatic resonance through multiple interwoven narrative threads."
    },
    {
      "id": "NARR-014",
      "name": "Frame Narrative",
      "category": "Narrative",
      "intent": "Create narrative depth through story-within-story structure, enabling meta-commentary and perspective shifts."
    },
    {
      "id": "NARR-015",
      "name": "Non-Linear Chronology",
      "category": "Narrative",
      "intent": "Create narrative intrigue and thematic resonance by presenting events out of temporal order."
    },
    {
      "id": "NARR-016",
      "name": "Moral Choice",
      "category": "Narrative",
      "intent": "Create meaningful player agency and thematic depth through decisions with ethical weight."
    },
    {
      "id": "NARR-017",
      "name": "Character Arc",
      "category": "Narrative",
      "intent": "Create emotional depth and narrative satisfaction through PC transformation over the course of the story."
    },
    {
      "id": "NARR-018",
      "name": "Twist/Reversal",
      "category": "Narrative",
      "intent": "Create memorable impact by subverting player expectations while remaining fair and meaningful."
    },
    {
      "id": "NARR-019",
      "name": "Environmental Storytelling",
      "category": "Narrative",
      "intent": "Convey narrative through world design rather than exposition, enabling player discovery and immersion."
    },
    {
      "id": "NARR-020",
      "name": "Recurring Motif",
      "category": "Narrative",
      "intent": "Create thematic coherence and resonance through repeated images, ideas, or elements."
    },
    {
      "id": "NARR-021",
      "name": "Mystery Structure",
      "category": "Narrative",
      "intent": "Drive narrative through central question that player investigates, creating engagement through discovery."
    },
    {
      "id": "NARR-022",
      "name": "Prophecy/Destiny",
      "category": "Narrative",
      "intent": "Create narrative drive and thematic weight through predetermined fate that player moves toward (or against)."
    },
    {
      "id": "NARR-023",
      "name": "PC Voice/Personality",
      "category": "Narrative",
      "intent": "The player character has a distinct voice, personality, or attitude that colors all interactions. Rather than a neutral \"You see a room\" narrator, the PC's perspective shapes descriptions, responses, and even which actions are available."
    },
    {
      "id": "NARR-024",
      "name": "Collaborative Storytelling",
      "category": "Narrative",
      "intent": "The player contributes narrative elements beyond action commands — naming things, choosing backstory details, defining relationships, or selecting motivations. The game incorporates player-authored content into the story."
    },
    {
      "id": "STRUC-001",
      "name": "Tutorial Integration",
      "category": "Structure",
      "intent": "Teach game mechanics through play rather than documentation."
    },
    {
      "id": "STRUC-002",
      "name": "Difficulty Curve",
      "category": "Structure",
      "intent": "Progressively increase challenge as the player gains skill and understanding."
    },
    {
      "id": "STRUC-003",
      "name": "Optional Content",
      "category": "Structure",
      "intent": "Provide rewarding non-required content that enriches the experience for thorough players."
    },
    {
      "id": "STRUC-004",
      "name": "Chapter Structure",
      "category": "Structure",
      "intent": "Divide the game into distinct acts or segments with clear transitions."
    },
    {
      "id": "STRUC-005",
      "name": "Scoring System",
      "category": "Structure",
      "intent": "Track player achievement numerically, rewarding progress and encouraging thoroughness."
    },
    {
      "id": "STRUC-006",
      "name": "Hint Integration",
      "category": "Structure",
      "intent": "Provide built-in assistance for stuck players without breaking immersion."
    },
    {
      "id": "STRUC-007",
      "name": "Prologue/Epilogue",
      "category": "Structure",
      "intent": "Frame the main game with opening and closing sequences that establish and resolve context."
    },
    {
      "id": "STRUC-008",
      "name": "Meta-Mechanics",
      "category": "Structure",
      "intent": "Game mechanics that exist *outside* the fiction — UNDO, SAVE/RESTORE, RESTART, or awareness of being in a game — are incorporated as design elements rather than just utilities. The game acknowledges or manipulates the player's relationship with the system."
    },
    {
      "id": "STRUC-009",
      "name": "New Game Plus / Replay Value",
      "category": "Structure",
      "intent": "The game changes on subsequent playthroughs. Content, puzzles, dialogue, or mechanics differ based on prior completions, encouraging replay and rewarding mastery."
    },
    {
      "id": "STRUC-010",
      "name": "Adaptive Difficulty",
      "category": "Structure",
      "intent": "The game adjusts challenge level based on player behavior. Struggling players receive more hints or easier puzzles; skilled players face tighter constraints or harder variants. The adaptation may be invisible or transparent."
    },
    {
      "id": "STRUC-011",
      "name": "Accessibility Patterns",
      "category": "Structure",
      "intent": "Structural design decisions that make the game playable by the widest possible audience. Accessibility is not an afterthought — it's a design pattern that affects parser behavior, output formatting, difficulty options, and interaction modes."
    },
    {
      "id": "CONV-001",
      "name": "ASK/TELL Topic Model",
      "category": "Conversation",
      "intent": "NPCs respond to specific topics raised by the player via ASK [NPC] ABOUT [TOPIC] or TELL [NPC] ABOUT [TOPIC] commands. This is the foundational conversation mechanic in parser IF — simple, flexible, and well-understood by players."
    },
    {
      "id": "CONV-002",
      "name": "Menu Dialogue",
      "category": "Conversation",
      "intent": "Instead of free-text input, the player selects from a list of numbered or lettered options during conversation. This eliminates guess-the-topic frustration and allows authors to control conversation flow precisely."
    },
    {
      "id": "CONV-003",
      "name": "Keyword Recognition",
      "category": "Conversation",
      "intent": "The NPC listens for specific words or phrases in player input, regardless of command structure. Instead of requiring formal ASK/TELL syntax, the NPC reacts to keywords spoken in their presence. This creates a more natural conversation feel."
    },
    {
      "id": "CONV-004",
      "name": "Mood-Influenced Responses",
      "category": "Conversation",
      "intent": "NPC conversation output varies based on the NPC's current emotional state or disposition toward the player. The same topic produces different responses depending on mood — a friendly NPC shares freely while an angry NPC withholds or attacks."
    },
    {
      "id": "CONV-005",
      "name": "Conversation State Tracking",
      "category": "Conversation",
      "intent": "The conversation system remembers what has been discussed, enabling continuity across multiple interactions with the same NPC. Topics can reference prior exchanges, NPCs can recall what the player told them, and conversation evolves over time."
    },
    {
      "id": "CONV-006",
      "name": "Multi-Party Conversation",
      "category": "Conversation",
      "intent": "Conversations involving more than two participants. Multiple NPCs may be present and react to what the player says, interrupt each other, agree or disagree, or carry on their own dialogue that the player observes or joins."
    },
    {
      "id": "NPC-024",
      "name": "Gossip Network",
      "category": "NPCs",
      "intent": "NPCs spread information to each other through authored propagation rules, creating an information economy the player can observe, manipulate, or exploit. Each NPC has a propagation profile (chatty, selective, mute) controlling what they share, with whom, and how quickly. Facts carry provenance — who told whom — enabling the player to trace information chains."
    },
    {
      "id": "NPC-025",
      "name": "Goal-Directed",
      "category": "NPCs",
      "intent": "NPC autonomously pursues multi-step plans (seek, acquire, move, wait, act) triggered by character state changes. Goals activate when conditions are met, execute one step per turn, and can be interrupted or suspended. The player witnesses NPC movement and actions, creating visible urgency and parallel agency in the world."
    },
    {
      "id": "NPC-026",
      "name": "Influencer",
      "category": "NPCs",
      "intent": "NPC modifies other NPCs' or the player's psychological state through proximity or deliberate action — intimidation, seduction, persuasion. Influence names are author-defined, not a fixed taxonomy. Targets can resist, with conditional exceptions that reveal character. Can be used as a step in goal pursuit."
    },
    {
      "id": "NPC-027",
      "name": "NPC Initiative",
      "category": "NPCs",
      "intent": "NPC starts conversation with the player based on character state conditions, rather than waiting to be addressed. The NPC approaches the player when internal state thresholds are met — trust, fear, urgency — creating the feeling of a living world where NPCs have their own agendas."
    },
    {
      "id": "NPC-028",
      "name": "Psychology / Inner State",
      "category": "NPCs",
      "intent": "NPC has multi-dimensional internal state — mood, disposition, threat awareness, personality traits, knowledge, beliefs — that evolves through events and interactions. All other NPC behavior (conversation, goals, propagation, influence) reads from and writes to this shared substrate. This is the foundation that makes NPC systems compose into a coherent character."
    },
    {
      "id": "OBJ-016",
      "name": "Equivalent / Stackable",
      "category": "Objects",
      "intent": "Multiple identical objects (coins, arrows, reagents) that the parser resolves without disambiguation, listings group by count, and commands accept numeric modifiers. Enables resource management, currency, ammunition, and bulk inventory."
    },
    {
      "id": "CONV-007",
      "name": "Constraint-Based Responses",
      "category": "Conversation",
      "intent": "NPC response selected by evaluating predicates against character state (mood, knowledge, trust, threat), not dialogue tree position. Same topic yields different responses as state evolves. Multiple candidate responses are authored with conditions; the system selects the best match at runtime."
    },
    {
      "id": "CONV-008",
      "name": "Confrontation / Evidence",
      "category": "Conversation",
      "intent": "Player presents information or evidence to NPC via TELL, forcing a reaction — confession, denial, deflection — based on what the NPC knows and has previously said. Distinct from ASK (requesting information). Enables detective and investigation gameplay where gathered evidence unlocks new conversation paths."
    },
    {
      "id": "CONV-009",
      "name": "Response Intent",
      "category": "Conversation",
      "intent": "NPC responses carry semantic intent (tell, lie, deflect, confess, refuse) that feeds back into character state and enables contradiction detection. When an NPC lies about a topic and is later confronted with evidence, the system knows they lied and can trigger confession or deeper deception paths."
    },
    {
      "id": "CONV-010",
      "name": "Persistent Conversation",
      "category": "Conversation",
      "intent": "Conversation persists as active state across multiple exchanges and non-conversation actions. NPC may continue speaking on subsequent turns without prompting. Conversation intent (eager, reluctant, hostile) and strength (passive, assertive, blocking) control NPC behavior between player utterances."
    },
    {
      "id": "CONV-011",
      "name": "Eavesdropping",
      "category": "Conversation",
      "intent": "Player observes NPC-to-NPC conversation, gaining information with a distinct provenance ('overheard') that may differ from what they'd learn by asking directly. NPCs may speak freely to each other about things they'd withhold from the player, creating an information asymmetry the player can exploit."
    }

  <script>
    {
      const patternsData = JSON.parse(document.getElementById('patterns-data').textContent);
        const { categories, nodes, edges } = patternsData;

        const nodeMap = new Map(nodes.map(n => [n.id, n]));
        const adj = new Map();
        nodes.forEach(n => adj.set(n.id, new Set()));
        edges.forEach(e => {
          adj.get(e.source)?.add(e.target);
          adj.get(e.target)?.add(e.source);
        });

        const byCategory = {};
        Object.keys(categories).forEach(cat => { byCategory[cat] = []; });
        nodes.forEach(n => {
          if (byCategory[n.category]) byCategory[n.category].push(n);
        });

        const content = document.getElementById('content');
        const breadcrumb = document.getElementById('breadcrumb');
        const bcHome = document.getElementById('bc-home');
        const bcSep2 = document.getElementById('bc-sep2');
        const bcCurrent = document.getElementById('bc-current');
        const searchInput = document.getElementById('search');
        const countEl = document.getElementById('count');
        const detailPanel = document.getElementById('detail');
        const detailContent = document.getElementById('detail-content');
        const overlay = document.getElementById('overlay');

        let currentView = 'categories';

        function closeDetail() {
          detailPanel.classList.remove('open');
          overlay.classList.remove('active');
        }
        document.getElementById('detail-close').addEventListener('click', closeDetail);
        overlay.addEventListener('click', closeDetail);

        function showDetail(d) {
          const connected = adj.get(d.id);
          const connNodes = [...connected].map(id => nodeMap.get(id)).filter(Boolean);
          const color = categories[d.category];

          detailContent.innerHTML = `
            <div class="detail-id">${d.id}</div>
            <div class="detail-name">${d.name}</div>
            <span class="detail-category" style="background:${color}22;color:${color};border:1px solid ${color}55">${d.category}</span>
            <div class="detail-section">
              <h3>Intent</h3>
              <p>${d.intent || 'No description available.'}</p>
            </div>
            ${connNodes.length > 0 ? `
            <div class="detail-section">
              <h3>Related Patterns (${connNodes.length})</h3>
              <div class="detail-connections">
                ${connNodes.map(cn => `<span class="detail-conn" data-id="${cn.id}" style="border-left:3px solid ${categories[cn.category]}">${cn.id}: ${cn.name}</span>`).join('')}
              </div>
            </div>` : ''}
          `;

          detailContent.querySelectorAll('.detail-conn').forEach(el => {
            el.addEventListener('click', () => {
              const target = nodeMap.get(el.dataset.id);
              if (target) showDetail(target);
            });
          });

          detailPanel.classList.add('open');
          overlay.classList.add('active');
        }

        function showCategories() {
          currentView = 'categories';
          closeDetail();
          searchInput.value = '';
          breadcrumb.classList.remove('visible');
          countEl.textContent = `${nodes.length} patterns`;

          content.innerHTML = '';
          const grid = document.createElement('div');
          grid.className = 'categories-grid fade-in';

          Object.entries(byCategory).forEach(([cat, patterns]) => {
            const card = document.createElement('div');
            card.className = 'category-card';
            const color = categories[cat];
            card.style.cssText = `border-top: 3px solid ${color}`;

            const previewItems = patterns.slice(0, 5).map(p => p.name);
            const more = patterns.length > 5 ? ` and ${patterns.length - 5} more` : '';

            card.innerHTML = `
              <div class="cat-header">
                <div class="cat-name">
                  <span class="cat-dot" style="background:${color}"></span>
                  ${cat}
                </div>
                <span class="cat-count">${patterns.length}</span>
              </div>
              <div class="cat-preview">
                ${previewItems.map(n => `<span class="cat-preview-item">${n}</span>`).join('')}${more ? `<span class="cat-preview-item" style="color:var(--color-muted)">${more}</span>` : ''}
              </div>
              <div class="cat-arrow">&rarr;</div>
            `;

            card.addEventListener('click', () => showCategoryPatterns(cat));
            grid.appendChild(card);
          });

          content.appendChild(grid);
        }

        function showCategoryPatterns(cat) {
          currentView = cat;
          closeDetail();
          searchInput.value = '';

          breadcrumb.classList.add('visible');
          bcSep2.style.display = '';
          bcCurrent.style.display = '';
          bcCurrent.textContent = cat;
          countEl.textContent = `${byCategory[cat].length} patterns`;

          content.innerHTML = '';
          const grid = document.createElement('div');
          grid.className = 'patterns-grid fade-in';

          byCategory[cat].forEach(p => {
            const card = document.createElement('div');
            card.className = 'pattern-card';
            card.dataset.id = p.id;
            card.innerHTML = `
              <div class="card-top">
                <span class="card-id">${p.id}</span>
                <span class="card-name">${p.name}</span>
              </div>
              <div class="card-intent">${p.intent || ''}</div>
            `;
            card.addEventListener('click', () => showDetail(p));
            grid.appendChild(card);
          });

          content.appendChild(grid);
        }

        bcHome.addEventListener('click', showCategories);

        searchInput.addEventListener('input', () => {
          const q = searchInput.value.toLowerCase();

          if (currentView === 'categories') {
            const cards = content.querySelectorAll('.category-card');
            let idx = 0;
            let totalVisible = 0;
            Object.entries(byCategory).forEach(([cat, patterns]) => {
              const card = cards[idx++];
              if (!card) return;
              if (!q) {
                card.style.display = '';
                totalVisible += patterns.length;
                return;
              }
              const match = cat.toLowerCase().includes(q) ||
                patterns.some(p =>
                  p.name.toLowerCase().includes(q) ||
                  p.id.toLowerCase().includes(q) ||
                  (p.intent && p.intent.toLowerCase().includes(q))
                );
              card.style.display = match ? '' : 'none';
              if (match) totalVisible += patterns.length;
            });
            countEl.textContent = q ? `matching categories` : `${nodes.length} patterns`;
          } else {
            const cards = content.querySelectorAll('.pattern-card');
            let visible = 0;
            cards.forEach(card => {
              const p = nodeMap.get(card.dataset.id);
              const match = !q || (
                p.id.toLowerCase().includes(q) ||
                p.name.toLowerCase().includes(q) ||
                (p.intent && p.intent.toLowerCase().includes(q))
              );
              card.style.display = match ? '' : 'none';
              if (match) visible++;
            });
            countEl.textContent = `${visible} pattern${visible !== 1 ? 's' : ''}`;
          }
        });

        showCategories();
    }
  </script>
