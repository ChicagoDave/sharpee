<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sharpee — Save panel</title>
<link rel="stylesheet" href="_common.css">
<style>
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.3);
    z-index: 40;
  }
  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 380px;
    background: var(--bg-alt);
    border-left: 1px solid var(--border);
    box-shadow: -20px 0 60px rgba(0, 0, 0, 0.4);
    display: flex;
    flex-direction: column;
    z-index: 50;
  }
  .drawer .hdr {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .drawer .hdr h2 { margin: 0; font-size: 16px; color: var(--accent-hot); }
  .drawer .close { background: transparent; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; }

  .save-body { padding: 16px 20px; overflow-y: auto; flex: 1; }

  .save-dialog {
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 20px;
  }
  .save-dialog .row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 10px;
  }
  .save-dialog .row input {
    flex: 1;
    background: var(--bg-sunken);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: var(--radius);
    font-size: 13px;
    outline: none;
  }
  .save-dialog .row input:focus { border-color: var(--accent); }

  .save-list-heading {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-weight: 600;
    margin: 18px 0 10px;
  }
  .save-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    padding: 10px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    align-items: center;
  }
  .save-row:hover { border-color: var(--accent); }
  .save-row .name {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }
  .save-row .meta {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 4px;
  }
  .save-row .meta .author { color: var(--text-muted); font-weight: 500; }
  .save-row.empty {
    font-style: italic;
    color: var(--text-faint);
    font-size: 13px;
  }
  .ghost-room {
    position: fixed; inset: 0; right: 380px;
    padding: 40px;
    color: var(--text-faint);
    opacity: 0.3;
  }
</style>
</head>
<body class="room-layout">

<div class="ghost-room">
  <div style="color: var(--accent-hot); font-size: 16px; font-weight: 600;">Tuesday book club — Zork I</div>
  <div style="margin-top: 30px; font-family: var(--font-story); font-size: 15px; line-height: 1.6;">
    Troll Room…
  </div>
</div>

<div class="drawer-backdrop"></div>
<div class="drawer">
  <div class="hdr">
    <h2>Saves</h2>
    <button class="close">✕</button>
  </div>

  <div class="save-body">

    <div class="save-dialog">
      <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 2px;">Create new save</div>
      <div class="row">
        <input type="text" placeholder="Save name (optional)" value="before-troll">
        <button class="btn-primary" style="padding: 8px 14px; font-size: 13px;">Save</button>
      </div>
      <div style="font-size: 11px; color: var(--text-faint); margin-top: 8px;">
        Only Command Entrants and above can save.
      </div>
    </div>

    <div class="save-list-heading">Existing saves · 3</div>

    <div class="save-row">
      <div>
        <div class="name">before-mailbox</div>
        <div class="meta"><span class="author">Alice</span> · 14 min ago</div>
      </div>
      <button class="btn-secondary" style="font-size: 12px; padding: 6px 12px;">Restore</button>
    </div>

    <div class="save-row">
      <div>
        <div class="name">after-leaflet</div>
        <div class="meta"><span class="author">Charlie</span> · 9 min ago</div>
      </div>
      <button class="btn-secondary" style="font-size: 12px; padding: 6px 12px;">Restore</button>
    </div>

    <div class="save-row">
      <div>
        <div class="name">unnamed</div>
        <div class="meta"><span class="author">Dave</span> · 3 min ago</div>
      </div>
      <button class="btn-secondary" style="font-size: 12px; padding: 6px 12px;">Restore</button>
    </div>

  </div>
</div>

</body>
</html>
