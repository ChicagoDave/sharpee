<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sharpee — Room closed overlay</title>
<link rel="stylesheet" href="_common.css">
<style>
  .room-closed-overlay {
    position: fixed; inset: 0;
    background: rgba(11, 11, 20, 0.85);
    backdrop-filter: blur(3px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .closed-card {
    max-width: 460px;
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-top: 3px solid var(--warning);
    border-radius: 10px;
    padding: 32px 36px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }
  .closed-card .icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(250, 179, 135, 0.15);
    color: var(--warning);
    font-size: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
  }
  .closed-card h2 {
    margin: 0 0 10px;
    font-size: 20px;
    color: var(--accent-hot);
  }
  .closed-card p {
    color: var(--text-muted);
    font-size: 14px;
    margin: 0 0 20px;
    line-height: 1.55;
  }
  .closed-card .countdown {
    font-size: 13px;
    color: var(--text-faint);
    margin-top: 16px;
  }
  .closed-card .countdown b { color: var(--text); font-family: var(--font-mono); }

  /* Alternative variant — recycled — commented for reference */
</style>
</head>
<body>

<div class="room-closed-overlay">
  <div class="closed-card">
    <div class="icon">⌧</div>
    <h2>This room has been closed</h2>
    <p>
      The Primary Host (<span style="color: var(--ph-color); font-weight: 600;">Dave</span>)
      deleted this room. All transcript, chat, and saves are gone. The join code
      <code style="font-family: var(--font-mono); color: var(--accent);">XYZB-3F56</code>
      has been returned to the pool.
    </p>
    <button class="btn-primary">Return to home</button>
    <div class="countdown">Redirecting in <b>4s</b>…</div>
  </div>
</div>

  </p>
-->

</body>
</html>
