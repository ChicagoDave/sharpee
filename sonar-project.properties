# Files completely excluded from analysis (build artifacts, generated output).
sonar.exclusions=website/public/**,templates/**,**/dist/**,**/dist-esm/**,**/dist-npm/**

# Files excluded from copy-paste detection (tests, configs, parallel barrels, generated/template HTML).
sonar.cpd.exclusions=**/tests/**,**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/vitest.config.ts,**/vitest.config.js,website/public/**,templates/**,packages/runtime/src/index.ts,packages/bridge/src/index.ts

# Tests excluded from coverage requirements (tests don't need coverage of themselves).
sonar.coverage.exclusions=**/tests/**,**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,website/public/**,templates/**
