# Zifmia single-container compose file (ADR-177 / ADR-179).
#
# Pulls the published image from GitHub Container Registry — no repo
# checkout or build toolchain required. To run from a source build
# instead (contributors, fork operators), use docker-compose.build.yml.
#
# From the repo root:    docker compose -f tools/zifmia/docker-compose.yml up -d
# From tools/zifmia/:    docker compose up -d
#
# Tag selection (ADR-179): pin to an immutable `:X.Y.Z` in production.
# `:1.0`, `:1`, `:latest` advance only when a newer release is the
# highest on that pin; a hotfix to an older major never regresses
# `:latest`. Override the tag with the ZIFMIA_IMAGE env var.
#
# State persists in two named volumes:
#   zifmia-data    — SQLite database (rooms, identities, sessions, saves)
#   zifmia-stories — operator-managed `*.sharpee` bundles. Drop a file in
#                    and signal the container with `docker kill -s HUP`
#                    to make it appear in GET /api/stories without restart.

services:
  zifmia:
    image: "${ZIFMIA_IMAGE:-ghcr.io/chicagodave/zifmia:1.0.0}"
    container_name: zifmia
    ports:
      - "${ZIFMIA_PORT:-3000}:3000"
    environment:
      ZIFMIA_PORT: "3000"
      ZIFMIA_HOST: "0.0.0.0"
      ZIFMIA_DB: "/data/zifmia.db"
      ZIFMIA_STORIES: "/stories"
      # Optional overrides — uncomment to use.
      # ZIFMIA_RECORDING_NOTICE: "${ZIFMIA_RECORDING_NOTICE:-}"
      # ZIFMIA_GRACE_MS: "${ZIFMIA_GRACE_MS:-30000}"
    volumes:
      - zifmia-data:/data
      - zifmia-stories:/stories
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/stories').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  zifmia-data:
  zifmia-stories:
