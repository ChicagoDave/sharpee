# Zifmia compose — contributor / fork build variant (ADR-179).
#
# Builds the image from the monorepo source tree instead of pulling
# the published image. Use this when you are changing Zifmia or one
# of its workspace dependencies and want a local rebuild loop.
#
# Operators deploying Zifmia should use docker-compose.yml (which
# pulls ghcr.io/chicagodave/zifmia:<version>).
#
# From the repo root:    docker compose -f tools/zifmia/docker-compose.build.yml up --build
# From tools/zifmia/:    docker compose -f docker-compose.build.yml up --build
#
# State persists in the same named volumes as the published variant
# (zifmia-data, zifmia-stories), so flipping between this file and
# docker-compose.yml keeps the same DB and story directory.

services:
  zifmia:
    build:
      # Build context is the repo root so the workspace is visible to
      # the Dockerfile's `COPY packages/`, `COPY tools/zifmia/`, etc.
      context: ../..
      dockerfile: tools/zifmia/Dockerfile
      args:
        # ADR-178 §AC-3: tag the image with the Story Runtime Baseline
        # version it ships. Override at build time from the manifest:
        #   docker compose -f docker-compose.build.yml build \
        #     --build-arg BASELINE_VERSION=$(node -p \
        #       "require('./packages/story-runtime-baseline/dist/index.js').BASELINE_VERSION")
        # The Dockerfile defaults to 1 if the arg is not provided; bumping
        # the baseline is an ADR-178 amendment that bumps this value.
        BASELINE_VERSION: "${BASELINE_VERSION:-1}"
    image: sharpee/zifmia:dev
    container_name: zifmia
    ports:
      - "${ZIFMIA_PORT:-3000}:3000"
    environment:
      ZIFMIA_PORT: "3000"
      ZIFMIA_HOST: "0.0.0.0"
      ZIFMIA_DB: "/data/zifmia.db"
      ZIFMIA_STORIES: "/stories"
      # Optional overrides — uncomment to use.
      # ZIFMIA_RECORDING_NOTICE: "${ZIFMIA_RECORDING_NOTICE:-}"
      # ZIFMIA_GRACE_MS: "${ZIFMIA_GRACE_MS:-30000}"
    volumes:
      - zifmia-data:/data
      - zifmia-stories:/stories
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/stories').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  zifmia-data:
  zifmia-stories:
