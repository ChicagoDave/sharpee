# Sharpee Multiuser Server — reference docker-compose.
#
# Intent: an operator with nothing but Docker installed can run
#   docker compose up
# and get a working instance on port 8080. Operators front the single
# exposed port with their own reverse proxy (TLS termination, etc.).
#
# Referenced by ADR-153 Acceptance Criterion #8 (Docker smoke).

services:
  server:
    # Build context is the repo root so the Dockerfile can access ../../packages/core.
    # From tools/server/, run: docker compose up --build
    build:
      context: ../..
      dockerfile: tools/server/Dockerfile
    image: sharpee-server:local
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - db-data:/data/db
      - ./stories:/data/stories:ro
      - ./sharpee-platform.yaml:/etc/sharpee-platform.yaml:ro
    environment:
      NODE_ENV: production

volumes:
  db-data:
