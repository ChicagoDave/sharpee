# Sharpee Multiuser Server — reference docker-compose.
#
# Intent: an operator with nothing but Docker installed can run
#   docker compose up
# and get a working instance on port 8080. Operators front the single
# exposed port with their own reverse proxy (TLS termination, etc.).
#
# Referenced by ADR-153 Acceptance Criterion #8 (Docker smoke).

services:
  server:
    # Build context is the repo root so the Dockerfile can access ../../packages/core.
    # From tools/server/, run: docker compose up --build
    build:
      context: ../..
      dockerfile: tools/server/Dockerfile
    image: sharpee-server:local
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - db-data:/data/db
      - ./stories:/data/stories:ro
      - ./sharpee-platform.yaml:/etc/sharpee-platform.yaml:ro
    environment:
      NODE_ENV: production
      # Operators: leave unset in production. Smoke tests set this to "1"
      # to bypass CAPTCHA verification on /api/rooms.
      CAPTCHA_BYPASS: "${CAPTCHA_BYPASS:-}"
      # Operators: leave unset in production. e2e tests set this to "1"
      # to disable the per-IP /api/identities rate limiter so back-to-back
      # runs from a single IP don't trip 429s. Mirrors CAPTCHA_BYPASS.
      RATE_LIMIT_BYPASS: "${RATE_LIMIT_BYPASS:-}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  db-data:
