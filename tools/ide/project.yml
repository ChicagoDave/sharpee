# Sharpee IDE — XcodeGen project spec
# Source of truth for SharpeeIDE.xcodeproj.
# Regenerate the .xcodeproj with: `xcodegen generate` (run from this directory).

name: SharpeeIDE

options:
  bundleIdPrefix: net.sharpee
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES
    # Disable Xcode's Previews stub-executor for debug builds.
    # The stub launches a separate dylib and breaks plain `open`/terminal launches on macOS 26.
    ENABLE_DEBUG_DYLIB: NO
    ENABLE_PREVIEWS: NO

# Swift Package dependencies (P2 — TS-aware editor, tree-sitter highlighting).
# SwiftTreeSitter: Swift binding over the tree-sitter C runtime (parse + query).
# TreeSitterTypeScript: the vendored TS/TSX grammar (exports tree_sitter_typescript()).
packages:
  SwiftTreeSitter:
    url: https://github.com/tree-sitter/swift-tree-sitter
    exactVersion: 0.10.0
  TreeSitterTypeScript:
    url: https://github.com/tree-sitter/tree-sitter-typescript
    branch: master

targets:
  SharpeeIDE:
    type: application
    platform: macOS
    sources:
      - path: SharpeeIDE
    dependencies:
      - sdk: WebKit.framework
      - package: SwiftTreeSitter
        product: SwiftTreeSitter
      - package: TreeSitterTypeScript
        product: TreeSitterTypeScript
    info:
      path: SharpeeIDE/Info.plist
      properties:
        CFBundleName: Sharpee
        CFBundleDisplayName: Sharpee
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "26.0"
        NSHumanReadableCopyright: "Copyright © 2026 David Cornelson"
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.developer-tools
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.sharpee.ide
        PRODUCT_NAME: SharpeeIDE
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  SharpeeIDETests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SharpeeIDETests
    dependencies:
      - target: SharpeeIDE
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.sharpee.ide.tests
        PRODUCT_NAME: SharpeeIDETests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SharpeeIDE.app/Contents/MacOS/SharpeeIDE"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SharpeeIDE:
    build:
      targets:
        SharpeeIDE: all
        SharpeeIDETests: [test]
    test:
      targets:
        - SharpeeIDETests
      gatherCoverageData: false
