# /etc/apache2/sites-available/sharpee.net-le-ssl.conf
#
# HTTPS (port 443) vhost for the Sharpee documentation website.
#
# IMPORTANT: certbot's `--apache` installer generated a version of this file
# that served a stale STATIC DocumentRoot (/home/dave/repos/sharpee/website/dist,
# an old repo path that no longer exists) → Apache returned 403 Forbidden.
# This is the corrected, canonical vhost: it reverse-proxies to the Next.js
# app on localhost:3017, exactly like the port-80 vhost and the devarch.ai
# setup. If certbot ever rewrites this file back to a DocumentRoot, re-copy
# this one over it.
#
#   sudo cp website/deploy/sharpee.net-le-ssl.conf /etc/apache2/sites-available/
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
#
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName sharpee.net
    ServerAlias www.sharpee.net
    ServerAdmin david.cornelson@gmail.com

    ProxyPreserveHost On
    ProxyPass / http://localhost:3017/
    ProxyPassReverse / http://localhost:3017/

    ErrorLog ${APACHE_LOG_DIR}/sharpee.net-error.log
    CustomLog ${APACHE_LOG_DIR}/sharpee.net-access.log combined

    SSLCertificateFile /etc/letsencrypt/live/sharpee.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/sharpee.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
