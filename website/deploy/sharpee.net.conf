# /etc/apache2/sites-available/sharpee.net.conf
#
# HTTP (port 80) vhost for the Sharpee documentation website.
# This is the PRE-SSL vhost: it lets Let's Encrypt complete the HTTP-01
# challenge. Once certbot runs it will generate the companion
# sharpee.net-le-ssl.conf (port 443) and rewrite this file to redirect
# 80 -> 443. See website/deploy/README.md for the full sequence.
#
#   sudo cp website/deploy/sharpee.net.conf /etc/apache2/sites-available/
#   sudo a2ensite sharpee.net
#   sudo systemctl reload apache2
#   sudo certbot --apache -d sharpee.net -d www.sharpee.net
#
<VirtualHost *:80>
    ServerName sharpee.net
    ServerAlias www.sharpee.net
    ServerAdmin webmaster@localhost

    ProxyPreserveHost On
    ProxyPass / http://localhost:3017/
    ProxyPassReverse / http://localhost:3017/

    ErrorLog ${APACHE_LOG_DIR}/sharpee.net-error.log
    CustomLog ${APACHE_LOG_DIR}/sharpee.net-access.log combined
</VirtualHost>
