[package]
name = "interpreter"
version = "0.9.92"
description = "Sharpee Story Interpreter"
authors = ["ChicagoDave"]
edition = "2021"

[lib]
name = "interpreter_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6"

