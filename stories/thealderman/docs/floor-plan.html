<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Alderman — Ground Floor Plan</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --accent: #e94560;
    --text: #eee;
    --muted: #888;
    --grid: #222;
    --room: #0f3460;
    --room-stroke: #4a6fa5;
    --room-hover: #1a4a7a;
    --connection: #4a6fa5;
    --label: #eee;
    --npc-dot: #f0a500;
    --weapon-dot: #e94560;
    --exit-dot: #4ecca3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 0.75rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
  }
  header h1 { font-size: 1.1rem; }
  header h1 span { color: var(--accent); }
  .controls { display: flex; gap: 1rem; align-items: center; font-size: 0.8rem; color: var(--muted); }
  .legend { display: flex; gap: 1.25rem; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 0.35rem; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .floor-tabs { display: flex; gap: 0.25rem; }
  .floor-tabs button {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--grid);
    padding: 0.3rem 0.75rem;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    border-radius: 3px;
  }
  .floor-tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }
  .floor-tabs button:hover:not(.active) { color: var(--text); }
  #canvas-wrap {
    position: fixed;
    top: 50px;
    left: 0;
    right: 0;
    bottom: 0;
  }
  canvas { display: block; width: 100%; height: 100%; }
  #tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--room-stroke);
    padding: 0.6rem 0.9rem;
    border-radius: 4px;
    font-size: 0.8rem;
    max-width: 280px;
    pointer-events: none;
    display: none;
    z-index: 200;
    line-height: 1.4;
  }
  #tooltip .tt-name { font-weight: bold; color: var(--accent); margin-bottom: 0.25rem; }
  #tooltip .tt-detail { color: var(--muted); font-size: 0.75rem; }
  #tooltip .tt-npcs { color: var(--npc-dot); margin-top: 0.25rem; }
  #tooltip .tt-items { color: var(--weapon-dot); margin-top: 0.15rem; }
</style>
</head>
<body>

<header>
  <h1>The <span>Alderman</span> — Floor Plan</h1>
  <div class="controls">
    <div class="floor-tabs">
      <button class="active" onclick="showFloor('ground')">Ground</button>
      <button onclick="showFloor('second')">2nd</button>
      <button onclick="showFloor('third')">3rd</button>
      <button onclick="showFloor('basement')">Basement</button>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:var(--npc-dot)"></span> NPC</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--weapon-dot)"></span> Weapon</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--exit-dot)"></span> Stairs/Elevator</div>
    </div>
  </div>
</header>

<div id="canvas-wrap">
  <canvas id="map"></canvas>
</div>
<div id="tooltip"></div>

<script>
const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
let dpr = window.devicePixelRatio || 1;
let W, H;
let currentFloor = 'ground';
let hoveredRoom = null;

// Room definitions per floor
// x,y are in a 0-100 coordinate space, mapped to canvas
const FLOORS = {
  ground: {
    label: 'Ground Floor',
    rooms: [
      { id: 'entrance', name: 'Front Entrance', aka: 'State Street',
        x: 50, y: 15, w: 16, h: 8, style: 'entrance',
        npcs: [], weapons: [],
        exits: ['N: State Street (outside)'],
        notes: 'Grand double doors opening onto State Street. The way in and out of the hotel.' },
      { id: 'foyer', name: 'Great Room / Foyer', aka: '"The Colosseum"',
        x: 50, y: 45, w: 30, h: 20,
        npcs: [], weapons: ['Fireplace poker'],
        exits: ['S: Staircase', 'E: Elevator Hall', 'SE: Bar'],
        notes: 'Central hub. Italian marble, gas chandeliers, massive fireplace. Entrance from street to the north. Elevator hall east, bar southeast.' },
      { id: 'restaurant', name: 'Restaurant', aka: 'Dining Area',
        x: 18, y: 45, w: 18, h: 20,
        npcs: ['Catherine Shelby (hostess)'], weapons: [],
        exits: ['S: Kitchen'],
        notes: 'Oriental carpet, white linen, silver candelabras.' },
      { id: 'kitchen', name: 'Kitchen', aka: '',
        x: 18, y: 72, w: 18, h: 14,
        npcs: [], weapons: ['Kitchen knife (knife block)'],
        exits: [],
        notes: 'Copper pots, iron racks, prep table. Behind swinging doors.' },
      { id: 'checkIn', name: 'Guest Check-In', aka: 'Waiting Area',
        x: 68, y: 28, w: 16, h: 14,
        npcs: [], weapons: [],
        exits: [],
        notes: 'Oak counter, brass bell, leather register, pegboard of keys. Casual chairs and tables dot the area in front of the desk. NE notch off foyer.' },
      { id: 'elevatorHall', name: 'Elevator Hall', aka: '',
        x: 78, y: 45, w: 14, h: 14,
        npcs: [], weapons: [],
        exits: ['Elevator: All floors'],
        notes: 'Hydraulic Otis elevator. Brass cage, lever-operated. East of foyer.' },
      { id: 'staircase', name: 'Grand Staircase', aka: '',
        x: 42, y: 72, w: 16, h: 14,
        npcs: [], weapons: [],
        exits: ['UP: Ballroom (2nd)', 'UP: Hallway (3rd)'],
        notes: 'Sweeping marble, ornate iron banister. Curves upward.' },
      { id: 'bar', name: 'Bar', aka: '',
        x: 66, y: 72, w: 18, h: 14,
        npcs: ['Ross Bielack', 'John Barber'], weapons: ['Champagne bottle'],
        exits: [],
        notes: 'Long mahogany bar, mirrored shelves, cigar smoke, leather stools. Southeast corner.' },
    ],
    connections: [
      { from: 'entrance', to: 'foyer', dir: 'N-S' },
      { from: 'foyer', to: 'restaurant', dir: 'W-E' },
      { from: 'foyer', to: 'checkIn', dir: 'NE', style: 'angled' },
      { from: 'foyer', to: 'elevatorHall', dir: 'W-E' },
      { from: 'foyer', to: 'staircase', dir: 'N-S' },
      { from: 'foyer', to: 'bar', dir: 'SE', style: 'angled' },
      { from: 'restaurant', to: 'kitchen', dir: 'N-S' },
    ]
  },
  second: {
    label: 'Second Floor',
    rooms: [
      { id: 'ballroom', name: 'Ballroom', aka: '',
        x: 50, y: 45, w: 35, h: 25,
        npcs: ['Viola Wainright (rehearsing)'], weapons: ['Curtain cord (stage)'],
        exits: ['DOWN: Staircase (Ground)'],
        notes: 'Cavernous. Sprung wooden floor, crystal chandeliers, velvet stage curtains.' },
      { id: 'stairLanding2', name: 'Staircase Landing', aka: '',
        x: 50, y: 78, w: 14, h: 10,
        npcs: [], weapons: [],
        exits: ['UP: 3rd Floor', 'DOWN: Ground Floor'],
        notes: 'Mid-staircase landing. Continues up and down.' },
    ],
    connections: [
      { from: 'ballroom', to: 'stairLanding2', dir: 'N-S' },
    ]
  },
  third: {
    label: 'Third Floor (Guest Rooms)',
    rooms: [
      { id: 'hallway3', name: 'Third Floor Hallway', aka: '',
        x: 50, y: 50, w: 50, h: 10,
        npcs: [], weapons: [],
        exits: ['DOWN: Staircase'],
        notes: 'Carpeted corridor, gas lamps. Numbered doors on both sides.' },
      { id: 'room302', name: 'Room 302', aka: "Stephanie's Suite",
        x: 18, y: 30, w: 14, h: 12,
        npcs: [], weapons: [],
        exits: [],
        notes: "Victim's room. Lavish. Vanity, writing desk, wilting flowers. Key evidence here." },
      { id: 'room304', name: 'Room 304', aka: "Ross's Room",
        x: 35, y: 30, w: 14, h: 12,
        npcs: [], weapons: [],
        exits: [],
        notes: "Baseball memorabilia, newspaper clippings, empty whiskey bottles." },
      { id: 'room306', name: 'Room 306', aka: "Viola's Room",
        x: 52, y: 30, w: 14, h: 12,
        npcs: [], weapons: [],
        exits: [],
        notes: "Theatre scripts, costumes, mirror with dried roses." },
      { id: 'room308', name: 'Room 308', aka: "Jack's Room",
        x: 35, y: 68, w: 14, h: 12,
        npcs: [], weapons: ['Revolver (nightstand)'],
        exits: [],
        notes: "Leather briefcase, property maps, brandy decanter. Nightstand with drawer." },
      { id: 'room310', name: 'Room 310', aka: "Player's Room",
        x: 52, y: 68, w: 14, h: 12,
        npcs: [], weapons: [],
        exits: [],
        notes: "Your room. Drafting tools, traveling case. Starting location." },
      { id: 'serviceCloset', name: 'Service Closet', aka: '',
        x: 78, y: 50, w: 12, h: 10,
        npcs: [], weapons: [],
        exits: ['DOWN: Laundry (Basement)'],
        notes: "Cleaning supplies, laundry chute, ladder to basement." },
    ],
    connections: [
      { from: 'hallway3', to: 'room302', dir: 'W' },
      { from: 'hallway3', to: 'room304', dir: 'NW' },
      { from: 'hallway3', to: 'room306', dir: 'N' },
      { from: 'hallway3', to: 'room308', dir: 'S' },
      { from: 'hallway3', to: 'room310', dir: 'SE' },
      { from: 'hallway3', to: 'serviceCloset', dir: 'E' },
    ]
  },
  basement: {
    label: 'Basement',
    rooms: [
      { id: 'laundry', name: 'Laundry', aka: '',
        x: 40, y: 45, w: 20, h: 18,
        npcs: [], weapons: ['Sad iron (pressing station)'],
        exits: ['UP: Service Closet (3rd)'],
        notes: "Copper washtubs, pressing stations, hanging linens, steam." },
      { id: 'boilerRoom', name: 'Boiler Room', aka: '',
        x: 68, y: 45, w: 16, h: 18,
        npcs: [], weapons: [],
        exits: [],
        notes: "Coal-fired boiler, pipes everywhere. Hot and loud." },
      { id: 'storage', name: 'Storage', aka: '',
        x: 40, y: 72, w: 20, h: 14,
        npcs: [], weapons: [],
        exits: [],
        notes: "Old furniture, crates, newspapers. Dim." },
    ],
    connections: [
      { from: 'laundry', to: 'boilerRoom', dir: 'W-E' },
      { from: 'laundry', to: 'storage', dir: 'N-S' },
    ]
  }
};

function resize() {
  dpr = window.devicePixelRatio || 1;
  const wrap = document.getElementById('canvas-wrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

function toCanvas(x, y) {
  const pad = 40;
  return [
    pad + (x / 100) * (W - pad * 2),
    pad + (y / 100) * (H - pad * 2),
  ];
}

function roomRect(room) {
  const [cx, cy] = toCanvas(room.x, room.y);
  const rw = (room.w / 100) * (W - 80);
  const rh = (room.h / 100) * (H - 80);
  return { x: cx - rw/2, y: cy - rh/2, w: rw, h: rh, cx, cy };
}

function draw() {
  const floor = FLOORS[currentFloor];
  ctx.clearRect(0, 0, W, H);

  // Draw grid
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 0.5;
  for (let gx = 0; gx < W; gx += 40) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for (let gy = 0; gy < H; gy += 40) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  // Floor label
  ctx.font = '14px Georgia';
  ctx.fillStyle = '#555';
  ctx.textAlign = 'left';
  ctx.fillText(floor.label, 15, 25);

  // Draw connections
  for (const conn of floor.connections) {
    const fromRoom = floor.rooms.find(r => r.id === conn.from);
    const toRoom = floor.rooms.find(r => r.id === conn.to);
    if (!fromRoom || !toRoom) continue;
    const fr = roomRect(fromRoom);
    const tr = roomRect(toRoom);

    ctx.strokeStyle = '#4a6fa5';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(fr.cx, fr.cy);
    ctx.lineTo(tr.cx, tr.cy);
    ctx.stroke();

    // Direction arrow at midpoint
    const mx = (fr.cx + tr.cx) / 2;
    const my = (fr.cy + tr.cy) / 2;
    ctx.fillStyle = '#4a6fa5';
    ctx.beginPath();
    ctx.arc(mx, my, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw rooms
  for (const room of floor.rooms) {
    const r = roomRect(room);
    const isHovered = hoveredRoom === room.id;

    // Room fill — entrance gets a distinct style
    const isEntrance = room.style === 'entrance';
    if (isEntrance) {
      ctx.fillStyle = isHovered ? '#2a3a2a' : '#1a2a1a';
      ctx.strokeStyle = isHovered ? '#e94560' : '#4ecca3';
      ctx.lineWidth = isHovered ? 2.5 : 2;
      ctx.setLineDash([6, 3]);
    } else {
      ctx.fillStyle = isHovered ? '#1a4a7a' : '#0f3460';
      ctx.strokeStyle = isHovered ? '#e94560' : '#4a6fa5';
      ctx.lineWidth = isHovered ? 2 : 1;
      ctx.setLineDash([]);
    }

    roundRect(ctx, r.x, r.y, r.w, r.h, 4);
    ctx.fill();
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw street arrow above entrance
    if (isEntrance) {
      const arrowX = r.cx;
      const arrowTop = r.y - 18;
      ctx.strokeStyle = '#4ecca3';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(arrowX, r.y - 4);
      ctx.lineTo(arrowX, arrowTop);
      ctx.stroke();
      // Arrowhead
      ctx.fillStyle = '#4ecca3';
      ctx.beginPath();
      ctx.moveTo(arrowX, arrowTop - 4);
      ctx.lineTo(arrowX - 5, arrowTop + 2);
      ctx.lineTo(arrowX + 5, arrowTop + 2);
      ctx.closePath();
      ctx.fill();
      // Label
      ctx.font = 'italic 9px Georgia';
      ctx.fillStyle = '#4ecca3';
      ctx.textAlign = 'center';
      ctx.fillText('State Street', arrowX, arrowTop - 8);
    }

    // Room name
    ctx.fillStyle = '#eee';
    ctx.font = 'bold 11px Georgia';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const name = room.name;
    const lines = wrapText(name, r.w - 10);
    const lineH = 14;
    const startY = r.cy - ((lines.length - 1) * lineH) / 2 - (room.aka ? 6 : 0);
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], r.cx, startY + i * lineH);
    }

    // Aka subtitle
    if (room.aka) {
      ctx.font = 'italic 9px Georgia';
      ctx.fillStyle = '#999';
      ctx.fillText(room.aka, r.cx, startY + lines.length * lineH);
    }

    // Dots for NPCs and weapons
    let dotX = r.x + 6;
    const dotY = r.y + r.h - 8;
    for (const npc of room.npcs) {
      ctx.fillStyle = '#f0a500';
      ctx.beginPath();
      ctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
      ctx.fill();
      dotX += 11;
    }
    for (const weapon of room.weapons) {
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
      ctx.fill();
      dotX += 11;
    }
    if (room.exits.length > 0) {
      ctx.fillStyle = '#4ecca3';
      ctx.beginPath();
      ctx.arc(r.x + r.w - 8, r.y + 8, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function wrapText(text, maxW) {
  ctx.font = 'bold 11px Georgia';
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function hitTest(mx, my) {
  const floor = FLOORS[currentFloor];
  for (const room of floor.rooms) {
    const r = roomRect(room);
    if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) {
      return room;
    }
  }
  return null;
}

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const room = hitTest(mx, my);

  if (room) {
    hoveredRoom = room.id;
    let html = `<div class="tt-name">${room.name}</div>`;
    html += `<div class="tt-detail">${room.notes}</div>`;
    if (room.npcs.length) html += `<div class="tt-npcs">NPCs: ${room.npcs.join(', ')}</div>`;
    if (room.weapons.length) html += `<div class="tt-items">Weapons: ${room.weapons.join(', ')}</div>`;
    if (room.exits.length) html += `<div style="color:#4ecca3;margin-top:0.15rem;">Exits: ${room.exits.join(', ')}</div>`;
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY + 15) + 'px';
  } else {
    hoveredRoom = null;
    tooltip.style.display = 'none';
  }
  draw();
});

canvas.addEventListener('mouseleave', () => {
  hoveredRoom = null;
  tooltip.style.display = 'none';
  draw();
});

function showFloor(floorId) {
  currentFloor = floorId;
  hoveredRoom = null;
  tooltip.style.display = 'none';
  document.querySelectorAll('.floor-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.floor-tabs button[onclick="showFloor('${floorId}')"]`).classList.add('active');
  draw();
}

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
