<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Alderman — Author Editor</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --muted: #999;
    --border: #333;
    --input-bg: #1e2a45;
    --high: #e94560;
    --med: #f0a500;
    --low: #4ecca3;
    --ok: #4ecca3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 0;
  }
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 1.5rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 1.4rem; letter-spacing: 0.05em; }
  header h1 span { color: var(--accent); }
  .header-actions { display: flex; gap: 0.75rem; align-items: center; }
  .header-actions .stats { color: var(--muted); font-size: 0.85rem; margin-right: 1rem; }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.5rem 1.25rem;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    border-radius: 3px;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  button.secondary { background: var(--surface2); border: 1px solid var(--border); }
  button.push-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
    font-size: 0.75rem;
    margin-left: 0.5rem;
    opacity: 0.4;
    pointer-events: none;
  }
  button.push-btn.active { opacity: 1; pointer-events: auto; background: var(--med); color: #111; border-color: var(--med); }
  button.push-btn.pushed { opacity: 1; pointer-events: none; background: var(--ok); color: #111; border-color: var(--ok); }
  button.revert-btn {
    background: transparent;
    border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
    font-size: 0.75rem;
    margin-left: 0.25rem;
    color: var(--muted);
  }
  button.revert-btn:hover { color: var(--accent); border-color: var(--accent); }
  main { max-width: 900px; margin: 0 auto; padding: 2rem; }
  nav.toc {
    background: var(--surface);
    padding: 1rem 1.5rem;
    margin-bottom: 2rem;
    border-radius: 4px;
    border-left: 3px solid var(--accent);
  }
  nav.toc h2 { font-size: 1rem; margin-bottom: 0.5rem; color: var(--accent); }
  nav.toc a {
    color: var(--muted);
    text-decoration: none;
    display: inline-block;
    margin-right: 1.5rem;
    font-size: 0.85rem;
  }
  nav.toc a:hover { color: var(--text); }
  section { margin-bottom: 3rem; }
  section h2 {
    font-size: 1.2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.5rem;
    margin-bottom: 1.5rem;
    color: var(--accent);
  }
  .entry {
    margin-bottom: 1.5rem;
    background: var(--surface);
    padding: 1rem 1.25rem;
    border-radius: 4px;
    border-left: 3px solid var(--border);
  }
  .entry.priority-high { border-left-color: var(--high); }
  .entry.priority-med { border-left-color: var(--med); }
  .entry.priority-low { border-left-color: var(--low); }
  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .entry-id {
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .entry-context {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 0.5rem;
  }
  .badge {
    font-size: 0.65rem;
    padding: 0.15rem 0.5rem;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-high { background: var(--high); color: white; }
  .badge-med { background: var(--med); color: #111; }
  .badge-low { background: var(--low); color: #111; }
  textarea {
    width: 100%;
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.75rem;
    font-family: 'Georgia', serif;
    font-size: 0.95rem;
    line-height: 1.5;
    resize: vertical;
    min-height: 60px;
    border-radius: 3px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea.modified { border-color: var(--med); background: #2a2a1a; }
  textarea.pushed { border-color: var(--ok); background: #1a2e2a; }
  .help {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }
  #toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--ok);
    color: #111;
    padding: 0.75rem 1.5rem;
    border-radius: 4px;
    font-weight: bold;
    display: none;
    z-index: 200;
  }
  .subsection { margin-bottom: 2rem; }
  .subsection h3 { font-size: 1rem; color: var(--muted); margin-bottom: 1rem; }
  .entry-status {
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 2px;
    margin-left: 0.5rem;
  }
  .status-pushed { background: var(--ok); color: #111; }
  .status-edited { background: var(--med); color: #111; }
  .entry-actions { display: flex; align-items: center; margin-top: 0.5rem; justify-content: flex-end; }
  .filter-bar { margin-bottom: 1.5rem; display: flex; gap: 0.5rem; align-items: center; }
  .filter-bar label { font-size: 0.85rem; color: var(--muted); margin-right: 0.5rem; }
  .filter-bar button { padding: 0.25rem 0.6rem; font-size: 0.8rem; }
  .filter-bar button.active-filter { background: var(--accent); }
  .entry.hidden { display: none; }
</style>
</head>

</header>

// --- EDITOR LOGIC ---
// States: 'unchanged' | 'edited' | 'pushed'
// localStorage keys:
//   alderman.draft.{id}  — current text (only if different from original)
//   alderman.state.{id}  — 'pushed' flag

const STORAGE_PREFIX = 'alderman.';
const originals = {};
let totalCount = 0;

function lsGet(key) { try { return localStorage.getItem(STORAGE_PREFIX + key); } catch { return null; } }
function lsSet(key, val) { try { localStorage.setItem(STORAGE_PREFIX + key, val); } catch {} }
function lsRm(key) { try { localStorage.removeItem(STORAGE_PREFIX + key); } catch {} }

function getState(id) {
  const draft = lsGet('draft.' + id);
  const pushed = lsGet('state.' + id) === 'pushed';
  if (pushed) return 'pushed';
  if (draft !== null && draft !== originals[id]) return 'edited';
  return 'unchanged';
}

function init() {
  const container = document.getElementById('editor');
  let html = '';

  for (const [sectionKey, section] of Object.entries(DATA)) {
    html += `<section id="${section.id}">`;
    html += `<h2>${section.title}</h2>`;
    if (section.help) html += `<p class="help" style="margin-bottom:1rem;">${section.help}</p>`;

    for (const entry of section.entries) {
      const pClass = entry.priority === 'high' ? 'priority-high' : entry.priority === 'med' ? 'priority-med' : 'priority-low';
      const bClass = entry.priority === 'high' ? 'badge-high' : entry.priority === 'med' ? 'badge-med' : 'badge-low';

      originals[entry.id] = entry.text;
      totalCount++;

      // Restore draft from localStorage if present
      const draft = lsGet('draft.' + entry.id);
      const displayText = draft !== null ? draft : entry.text;
      const rows = Math.max(2, Math.ceil(displayText.length / 80));

      const eid = cssId(entry.id);

      html += `<div class="entry ${pClass}" id="entry_${eid}">`;
      html += `<div class="entry-header">`;
      html += `<span class="entry-id">${entry.id}<span class="entry-status" id="status_${eid}"></span></span>`;
      html += `<span class="badge ${bClass}">${entry.priority}</span>`;
      html += `</div>`;
      html += `<p class="entry-context">${entry.context}</p>`;
      html += `<textarea id="t_${eid}" rows="${rows}" oninput="onEdit('${entry.id}')">${escHtml(displayText)}</textarea>`;
      html += `<div class="entry-actions">`;
      html += `<button class="revert-btn" id="revert_${eid}" onclick="revertOne('${entry.id}')" title="Revert to original">Revert</button>`;
      html += `<button class="push-btn" id="push_${eid}" onclick="pushOne('${entry.id}')">Push</button>`;
      html += `</div>`;
      html += `</div>`;
    }
    html += `</section>`;
  }

  container.innerHTML = html;

  // Apply saved states
  for (const id of Object.keys(originals)) {
    refreshEntryUI(id);
  }
  updateStats();
}

function cssId(id) { return id.replace(/\./g, '_'); }

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function onEdit(id) {
  const eid = cssId(id);
  const el = document.getElementById('t_' + eid);
  const text = el.value;

  // Save draft
  if (text !== originals[id]) {
    lsSet('draft.' + id, text);
  } else {
    lsRm('draft.' + id);
  }

  // If it was pushed and now edited again, reset to edited
  if (lsGet('state.' + id) === 'pushed' && text !== lsGet('pushed_text.' + id)) {
    lsRm('state.' + id);
    lsRm('pushed_text.' + id);
  }

  refreshEntryUI(id);
  updateStats();
}

function refreshEntryUI(id) {
  const eid = cssId(id);
  const el = document.getElementById('t_' + eid);
  const statusEl = document.getElementById('status_' + eid);
  const pushBtn = document.getElementById('push_' + eid);
  const state = getState(id);

  el.classList.remove('modified', 'pushed');
  pushBtn.classList.remove('active', 'pushed');
  statusEl.className = 'entry-status';
  statusEl.textContent = '';

  if (state === 'pushed') {
    el.classList.add('pushed');
    pushBtn.classList.add('pushed');
    pushBtn.textContent = 'Pushed';
    statusEl.classList.add('status-pushed');
    statusEl.textContent = 'pushed';
  } else if (state === 'edited') {
    el.classList.add('modified');
    pushBtn.classList.add('active');
    pushBtn.textContent = 'Push';
  } else {
    pushBtn.textContent = 'Push';
  }
}

function pushOne(id) {
  const eid = cssId(id);
  const el = document.getElementById('t_' + eid);
  const text = el.value;

  if (text === originals[id]) return;

  // Build the change object
  const change = {};
  change[id] = { original: originals[id], revised: text };
  const json = JSON.stringify(change, null, 2);

  // Copy to clipboard
  navigator.clipboard.writeText(json).then(() => {
    // Mark as pushed
    lsSet('state.' + id, 'pushed');
    lsSet('pushed_text.' + id, text);
    refreshEntryUI(id);
    updateStats();
    toast(`Pushed: ${id}`);
  }).catch(() => {
    toast('Clipboard failed — check permissions');
  });
}

function revertOne(id) {
  const eid = cssId(id);
  const el = document.getElementById('t_' + eid);
  el.value = originals[id];
  lsRm('draft.' + id);
  lsRm('state.' + id);
  lsRm('pushed_text.' + id);
  refreshEntryUI(id);
  updateStats();
}

function updateStats() {
  let editedCount = 0;
  let pushedCount = 0;
  for (const id of Object.keys(originals)) {
    const state = getState(id);
    if (state === 'edited') editedCount++;
    if (state === 'pushed') pushedCount++;
  }
  const parts = [];
  if (editedCount) parts.push(`${editedCount} pending`);
  if (pushedCount) parts.push(`${pushedCount} pushed`);
  document.getElementById('stats').textContent = parts.length
    ? parts.join(' | ') + ` / ${totalCount} total`
    : `${totalCount} entries`;
}

function showPending() {
  const changes = {};
  let count = 0;
  for (const id of Object.keys(originals)) {
    if (getState(id) === 'edited') {
      const eid = cssId(id);
      const el = document.getElementById('t_' + eid);
      changes[id] = { original: originals[id], revised: el.value };
      count++;
    }
  }
  if (count === 0) {
    alert('No pending (un-pushed) changes.');
    return;
  }
  const json = JSON.stringify(changes, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    toast(`${count} pending change(s) copied to clipboard`);
  }).catch(() => {
    // Fallback
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'alderman-pending.json'; a.click();
    URL.revokeObjectURL(url);
  });
}

function resetAll() {
  if (!confirm('Reset ALL entries to original text and clear all pushed/edited state?')) return;
  for (const id of Object.keys(originals)) {
    const eid = cssId(id);
    const el = document.getElementById('t_' + eid);
    if (el) el.value = originals[id];
    lsRm('draft.' + id);
    lsRm('state.' + id);
    lsRm('pushed_text.' + id);
    refreshEntryUI(id);
  }
  updateStats();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 2500);
}

init();
</script>
